# nginx site for admin.vote.kicon.com — the privileged admin console SPA.
#
# Install on the server (68.183.121.168):
#   sudo cp admin.vote.kicon.com.conf /etc/nginx/sites-available/admin.vote.kicon.com
#   sudo ln -s /etc/nginx/sites-available/admin.vote.kicon.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.vote.kicon.com
#
# CRITICAL: this is the highest-privilege origin and MUST NEVER be framed. The
# X-Frame-Options / frame-ancestors headers below enforce that in prod, mirroring
# what admin/vite.config.ts sets for dev/preview. Do NOT copy this file's framing
# rules onto the consumer site (vote.kicon.com) — that surface is embeddable.
#
# nginx add_header caveat: a location block that declares its OWN add_header does
# NOT inherit server-level add_headers. So the framing headers are repeated in
# every location that sets caching headers, guaranteeing they ship on every
# response (`always` = include even on error/redirect responses).

server {
    listen 80;
    listen [::]:80;
    server_name admin.vote.kicon.com;

    root /var/www/admin.vote.kicon.com/html;
    index index.html;

    # Deny framing on every response from this origin.
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Long-cache content-hashed build assets; immutable per deploy.
    location /assets/ {
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header Cache-Control "public, immutable" always;
        expires 1y;
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, or clients pin to a stale bundle.
    location = /index.html {
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        add_header Cache-Control "no-cache" always;
    }
}
