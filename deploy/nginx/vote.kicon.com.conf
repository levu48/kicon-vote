# nginx site for vote.kicon.com — the embeddable public consumer SPA.
#
# Install on the server (68.183.121.168):
#   sudo cp vote.kicon.com.conf /etc/nginx/sites-available/vote.kicon.com
#   sudo ln -s /etc/nginx/sites-available/vote.kicon.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d vote.kicon.com` to obtain/renew a cert and
# let certbot rewrite the listen 443 block. The HTTP block below is what certbot
# expects to find.
#
# NOTE: This is the CONSUMER surface — it is intentionally embeddable, so it does
# NOT set X-Frame-Options/frame-ancestors. The admin surface (admin.vote.kicon.com)
# is a different origin and MUST deny framing; do not reuse this file for it.

server {
    listen 80;
    listen [::]:80;
    server_name vote.kicon.com;

    root /var/www/vote.kicon.com/html;
    index index.html;

    # Long-cache the content-hashed build assets; they're immutable per deploy.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths render index.html so client-side routing works.
    # index.html itself must never be cached, or clients pin to a stale bundle.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
